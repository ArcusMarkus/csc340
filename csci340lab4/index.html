<!DOCTYPE html>

<html>
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Anime & Pokemon Center</title>

        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style.css">
    </head>

    <body>


        <div class="sidebar" id="Mainsidebar">

            <button id="navCollapseButton">☰</button>

            <ul>

                <li><a href="#animesection">Anime</a></li>
                <li><a href="#pokemonsection">Pokemon</a></li>
                <li><a href="#about">About</a></li>
            </ul>

        </div>

        <div class="main-content container-fluid">

            <h1 class="display-3 mb-4">
                Anime & Pokemon Center
            </h1>

            <h2 id="animesection">
                Anime Search
            </h2>

            <input
                type="text"
                id="animeInput"
                class="form-control w-50 mb-3"
                placeholder="Enter anime name"
            >

            <button id="animebtn" class="btn btn-primary mb-5">
                Search Anime
            </button>

            <div class="card p-4 mb-5">
                <div id="animeData"></div>
            </div>

            <h2 id="pokemonsection">
                Pokemon Search
            </h2>

             <input
                type="text"
                id="pokemonInput"
                class="form-control w-50 mb-3"
                placeholder="Enter pokemon name"
            >

            <button id="pokemonbtn" class="btn btn-primary mb-5">
                Search Pokemon
            </button>

            <div class="card p-4">
                <div id="pokemonData"></div>

        </div>
        
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>


           
    </body>
</html>
